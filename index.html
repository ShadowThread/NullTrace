<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The.Unknown.Step</title>
  <style>
    /* ===== Reset & základy ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== Kontejner ===== */
    .container {
      text-align: center;
      max-width: 600px;
      padding: 2rem;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      letter-spacing: 1px;
      font-weight: 600;
      color: #00ffcc;
      text-shadow: 0 0 10px rgba(0,255,204,0.6);
    }

    /* ===== Animovaný text ===== */
    .typing {
      font-size: 1.2rem;
      line-height: 1.6;
      border-right: 2px solid #00ffcc;
      white-space: nowrap;
      overflow: hidden;
      display: inline-block;
      animation: caret 0.8s infinite;
    }

    @keyframes caret {
      50% { border-color: transparent; }
    }

    /* ===== Fade-in efekt pro container ===== */
    .container {
      opacity: 0;
      animation: fadeIn 2s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ===== Odkazy / tlačítka ===== */
    .links {
      margin-top: 2rem;
    }

    .btn {
      display: inline-block;
      margin: 0.5rem;
      padding: 0.8rem 1.5rem;
      border: 2px solid #00ffcc;
      color: #00ffcc;
      text-decoration: none;
      font-size: 1rem;
      border-radius: 30px;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: #00ffcc;
      color: #0f0f0f;
      box-shadow: 0 0 15px rgba(0,255,204,0.8);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>The.Unknown.Step</h1>
    <div class="typing" id="typing"></div>

    <div class="links">
      <a href="https://www.instagram.com/the.first.step" target="_blank" class="btn">Instagram</a>
      <a href="https://drive.google.com" target="_blank" class="btn">Google Drive</a>
    </div>
  </div>

  <script>
    // Text k napsání
    const text = "Welcome to the hidden path...\nOnly those who seek will find.\nThe.First.Step awaits you.";

    const typingElement = document.getElementById("typing");
    let index = 0;

    function type() {
      if (index < text.length) {
        typingElement.textContent += text.charAt(index);
        index++;
        setTimeout(type, 60); // rychlost psaní
      }
    }

    window.onload = () => {
      type();
    };
  </script>
</body>
</html>
