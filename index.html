<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Přihlášení</title>
  <style>
    body {
      font-family: "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(12px);
      width: 100%;
      max-width: 380px;
      transition: transform 0.3s ease;
    }
    .card:hover {
      transform: translateY(-5px);
    }

    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 1.8rem;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }
    label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 0.4rem;
    }
    input {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border-radius: 0.5rem;
      border: none;
      outline: none;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      transition: background 0.3s ease;
    }
    input:focus {
      background: rgba(255, 255, 255, 0.3);
    }

    .error {
      color: #ff6b6b;
      font-size: 0.85rem;
      margin-top: 0.3rem;
      display: none;
    }

    button {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 0.6rem;
      background: #ffcc00;
      color: #222;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
    }
    button:hover {
      background: #ffdb4d;
      transform: scale(1.03);
    }

    #content {
      display: none;
      text-align: center;
      margin-top: 1.5rem;
      animation: fadeIn 0.6s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Přihlášení</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Uživatel</label>
        <input type="text" id="username" placeholder="Zadej uživatelské jméno" required />
        <div id="usernameError" class="error">Neplatné jméno.</div>
      </div>
      <div class="form-group">
        <label for="password">Ověření</label>
        <input type="password" id="password" placeholder="Zadej ověřovací kód" required />
        <div id="passwordError" class="error">Špatný kód.</div>
      </div>
      <button type="submit">Odeslat</button>
    </form>

    <div id="content">
      <h2>Vítej zpět 👋</h2>
      <p>Tady je skrytý obsah, který se ukáže jen po správném přihlášení.</p>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById("loginForm");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const usernameError = document.getElementById("usernameError");
    const passwordError = document.getElementById("passwordError");
    const content = document.getElementById("content");

    // Správné údaje
    const VALID_USER = "The.Unknown.Step";
    const VALID_PASS = "9sctci10xu";

    loginForm.addEventListener("submit", function (e) {
      e.preventDefault();

      let valid = true;
      usernameError.style.display = "none";
      passwordError.style.display = "none";

      if (usernameInput.value !== VALID_USER) {
        usernameError.style.display = "block";
        valid = false;
      }
      if (passwordInput.value !== VALID_PASS) {
        passwordError.style.display = "block";
        valid = false;
      }

      if (valid) {
        loginForm.style.display = "none";
        content.style.display = "block";
      }
    });
  </script>
</body>
</html>
