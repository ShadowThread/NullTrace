<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Secure Access</title>
  <style>
    body {
      background-color: #0d0d0d;
      color: #00ff99;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    #loading, #login, #redirect {
      display: none;
      text-align: left;
      max-width: 600px;
      width: 90%;
    }

    .line {
      opacity: 0;
      animation: fadeIn 0.6s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    input {
      background: black;
      border: none;
      border-bottom: 1px solid #00ff99;
      color: #00ff99;
      padding: 8px;
      width: 100%;
      font-size: 16px;
      outline: none;
    }

    button {
      margin-top: 12px;
      background: black;
      color: #00ff99;
      border: 1px solid #00ff99;
      padding: 6px 14px;
      cursor: pointer;
      font-family: "Courier New", monospace;
      transition: background 0.2s;
    }

    button:hover {
      background: #003322;
    }

    .blink {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>

  <div id="loading"></div>

  <div id="login">
    <p>UZIVATEL: <span style="color:white;">The.Unknown.Step</span></p>
    <p>OVERENI:</p>
    <input type="password" id="password" placeholder="Zadej přístupový klíč">
    <br>
    <button onclick="checkPassword()">Potvrdit</button>
    <p id="error" style="color: red; display: none;">Nesprávný klíč, přístup odepřen.</p>
  </div>

  <div id="redirect">
    <p>Access granted... <span class="blink">Redirecting</span></p>
  </div>

  <script>
    const correctPassword = "9sctci10xu";
    const loadingLines = [
      "Initializing secure channel...",
      "Loading encryption keys...",
      "Bypassing proxy layers...",
      "Establishing connection...",
      "Verifying digital identity..."
    ];

    // postupné vypisování hlášek
    function showLoading() {
      const loadingDiv = document.getElementById("loading");
      let delay = 0;

      loadingLines.forEach((line, index) => {
        const p = document.createElement("p");
        p.classList.add("line");
        p.style.animationDelay = (index * 1.2) + "s";
        p.textContent = line;
        loadingDiv.appendChild(p);
        delay = (index + 1) * 1200;
      });

      // po dokončení zobraz login
      setTimeout(() => {
        loadingDiv.style.display = "none";
        document.getElementById("login").style.display = "block";
      }, delay + 1000);
    }

    function checkPassword() {
      const password = document.getElementById("password").value;
      if (password === correctPassword) {
        document.getElementById("login").style.display = "none";
        document.getElementById("redirect").style.display = "block";

        setTimeout(() => {
          window.location.href = "https://www.google.com"; // změň na cílový odkaz
        }, 2500);
      } else {
        document.getElementById("error").style.display = "block";
      }
    }

    // spusť loading hned po načtení
    window.onload = () => {
      document.getElementById("loading").style.display = "block";
      showLoading();
    };
  </script>

</body>
</html>
