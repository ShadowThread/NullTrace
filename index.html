<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přihlášení</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            text-align: center;
            padding-top: 100px;
        }
        #login-box {
            background-color: white;
            padding: 30px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px #aaa;
        }
        input {
            padding: 8px;
            width: 90%;
            margin: 5px 0;
        }
        button {
            padding: 8px 15px;
            margin-top: 10px;
        }
        #feedback {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="login-box">
        <h2>Přihlášení</h2>
        <input type="text" id="username" placeholder="Uživatelské jméno"><br>
        <input type="password" id="password" placeholder="Ověření"><br>
        <button onclick="checkLogin()">Odeslat</button>
        <p id="feedback"></p>
    </div>

    <script>
        function checkLogin() {
            const user = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value.trim();
            const feedback = document.getElementById("feedback");

            if(user === "The.Unknown.Step" && pass === "9sctci10xu") {
                feedback.textContent = "Přihlášení úspěšné! Vítejte.";
                feedback.style.color = "green";
                // Zde můžeš přesměrovat hráče na další stránku hádanek
                // např.: window.location.href = "hadanky.html";
            } else {
                feedback.textContent = "Špatné uživatelské jméno nebo ověření!";
                feedback.style.color = "red";
            }
        }
    </script>
</body>
</html>
